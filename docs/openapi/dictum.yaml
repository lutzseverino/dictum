openapi: 3.1.0
info:
  title: Dictum Control Plane API
  version: 0.1.0
  summary: Conventional REST contract for the first Dictum control-plane slice.
  description: >
    This contract defines the first reviewable HTTP surface for Dictum using
    conventional REST resource design. It covers post management and site
    settings without introducing public-site ownership or
    persistence-specific details.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Session
    description: Manage the authenticated control-plane session.
  - name: Posts
    description: Manage markdown-backed post resources.
  - name: Site Settings
    description: Manage site-level settings such as title, subtitle, and MOTD.
paths:
  /api/v1/session:
    get:
      tags:
        - Session
      operationId: get
      summary: Get current session
      description: Return the current authenticated control-plane session.
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: Session returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
              examples:
                default:
                  value:
                    username: admin
                    csrfToken: 4cf652f5-4a03-4e20-b6c8-1ef60e162a8c
        "401":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
    post:
      tags:
        - Session
      operationId: create
      summary: Create session
      description: Authenticate the operator and create a control-plane session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
            examples:
              default:
                value:
                  username: admin
                  password: change-me
      responses:
        "200":
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
    delete:
      tags:
        - Session
      operationId: delete
      summary: Delete session
      description: Invalidate the current control-plane session when one exists.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "204":
          description: Session deleted successfully.
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/posts:
    get:
      tags:
        - Posts
      operationId: listPosts
      summary: List posts
      description: Return post summaries for the control plane.
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: Post summaries returned successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostSummary"
              examples:
                default:
                  value:
                    - slug: dictum-begins
                      title: Dictum Begins
                      excerpt: A first post for a Dictum-managed blog.
                      status: published
                      template: essay
                      publishedAt: "2026-03-12"
                      tags:
                        - architecture
                        - foundation
                      hasStylesheet: true
                    - slug: remote-controls-later
                      title: Remote Controls, Later
                      excerpt: The admin experience manages publish and settings mutations.
                      status: draft
                      template: dispatch
                      publishedAt: null
                      tags:
                        - admin
                        - control-plane
                      hasStylesheet: false
        default:
          $ref: "#/components/responses/ProblemResponse"
    post:
      tags:
        - Posts
      operationId: createPost
      summary: Create a post
      description: Create a new markdown-backed post resource.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
            examples:
              default:
                value:
                  title: Notes on Remote Editing
                  slug: notes-on-remote-editing
                  excerpt: First thoughts on a phone-first publishing workflow.
                  template: note
                  tags:
                    - product
                    - mobile
                  body: |
                    Remote editing should stay lightweight.

                    The first slice only needs a durable markdown body.
      responses:
        "201":
          description: Post created successfully.
          headers:
            Location:
              description: Canonical URL for the created post resource.
              schema:
                type: string
                format: uri-reference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "409":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/posts/{slug}:
    get:
      tags:
        - Posts
      operationId: getPost
      summary: Get a post
      description: Return the full control-plane representation of a single post.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PostSlug"
      responses:
        "200":
          description: Post returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
              examples:
                default:
                  value:
                    slug: dictum-begins
                    title: Dictum Begins
                    excerpt: A first post for a Dictum-managed blog.
                    status: published
                    template: essay
                    publishedAt: "2026-03-12"
                    tags:
                      - architecture
                      - foundation
                    hasStylesheet: true
                    body: |
                      Dictum starts life as a control plane with a deliberate split between content management and public presentation.

                      Blog frontends remain external consumers.
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
    patch:
      tags:
        - Posts
      operationId: updatePost
      summary: Update a post
      description: Apply a partial update to a post resource.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PostSlug"
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/UpdatePostRequest"
            examples:
              default:
                value:
                  title: Notes on Remote Editing
                  excerpt: Updated framing for the draft.
                  tags:
                    - product
                    - editing
                  body: |
                    Remote editing should stay lightweight.

                    This update proves partial edits are resource-oriented.
      responses:
        "200":
          description: Post updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "415":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/posts/{slug}/publish:
    post:
      tags:
        - Posts
      operationId: publishPost
      summary: Publish a post
      description: Trigger the publish action for a draft post.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PostSlug"
        - $ref: "#/components/parameters/CsrfToken"
      responses:
        "200":
          description: Post published successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "409":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
  /api/v1/settings/site:
    get:
      tags:
        - Site Settings
      operationId: getSiteSettings
      summary: Get site settings
      description: Return the current site-level settings resource.
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: Site settings returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettingsResponse"
              examples:
                default:
                  value:
                    title: Dictum
                    subtitle: A remotely steerable markdown blog kit.
                    motd: "Foundation mode is live: boundaries first, resources next."
        "401":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
    patch:
      tags:
        - Site Settings
      operationId: updateSiteSettings
      summary: Update site settings
      description: Apply a partial update to the site settings resource.
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/CsrfToken"
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              $ref: "#/components/schemas/UpdateSiteSettingsRequest"
            examples:
              default:
                value:
                  subtitle: A modular control plane for developer-owned personal blogs.
                  motd: "Control-plane contract work is underway."

      responses:
        "200":
          description: Site settings updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettingsResponse"
        "401":
          $ref: "#/components/responses/ProblemResponse"
        "403":
          $ref: "#/components/responses/ProblemResponse"
        "415":
          $ref: "#/components/responses/ProblemResponse"
        default:
          $ref: "#/components/responses/ProblemResponse"
components:
  parameters:
    CsrfToken:
      name: X-CSRF-TOKEN
      in: header
      required: true
      description: CSRF token for an authenticated control-plane session.
      schema:
        type: string
    PostSlug:
      name: slug
      in: path
      required: true
      description: Stable slug identifying a post resource.
      schema:
        type: string
        pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
  responses:
    ProblemResponse:
      description: Problem details response.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
          examples:
            notFound:
              value:
                type: https://dictum.dev/problems/post-not-found
                title: Resource not found
                status: 404
                code: post.not_found
                params:
                  slug: remote-controls-later
                detail: No post exists for slug remote-controls-later
                instance: /api/v1/posts/remote-controls-later
  schemas:
    CreateSessionRequest:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
    SessionResponse:
      type: object
      additionalProperties: false
      required:
        - username
        - csrfToken
      properties:
        username:
          type: string
        csrfToken:
          type: string
    PostStatus:
      type: string
      enum:
        - draft
        - published
    PostTemplate:
      type: string
      enum:
        - essay
        - note
        - dispatch
    PostSummary:
      type: object
      additionalProperties: false
      required:
        - slug
        - title
        - excerpt
        - status
        - template
        - tags
        - hasStylesheet
      properties:
        slug:
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        title:
          type: string
        excerpt:
          type: string
        status:
          $ref: "#/components/schemas/PostStatus"
        template:
          $ref: "#/components/schemas/PostTemplate"
        publishedAt:
          type:
            - string
            - "null"
          format: date
        tags:
          type: array
          items:
            type: string
            minLength: 1
        hasStylesheet:
          type: boolean
    PostResponse:
      type: object
      additionalProperties: false
      required:
        - slug
        - title
        - excerpt
        - status
        - template
        - tags
        - hasStylesheet
        - body
      properties:
        slug:
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        title:
          type: string
        excerpt:
          type: string
        status:
          $ref: "#/components/schemas/PostStatus"
        template:
          $ref: "#/components/schemas/PostTemplate"
        publishedAt:
          type:
            - string
            - "null"
          format: date
        tags:
          type: array
          items:
            type: string
            minLength: 1
        hasStylesheet:
          type: boolean
        body:
          type: string
    CreatePostRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - slug
        - excerpt
        - template
        - tags
        - body
      properties:
        title:
          type: string
        slug:
          type: string
          pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
        excerpt:
          type: string
        template:
          $ref: "#/components/schemas/PostTemplate"
        tags:
          type: array
          items:
            type: string
            minLength: 1
        body:
          type: string
        stylesheet:
          type:
            - string
            - "null"
          description: Optional raw CSS sidecar content for the post.
    UpdatePostRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        title:
          type: string
        excerpt:
          type: string
        template:
          $ref: "#/components/schemas/PostTemplate"
        tags:
          type: array
          items:
            type: string
        body:
          type: string
        stylesheet:
          type:
            - string
            - "null"
        removeStylesheet:
          type: boolean
          description: Remove the stylesheet sidecar when true.
    SiteSettingsResponse:
      type: object
      additionalProperties: false
      required:
        - title
        - subtitle
        - motd
      properties:
        title:
          type: string
        subtitle:
          type: string
        motd:
          type: string
    UpdateSiteSettingsRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        title:
          type: string
        subtitle:
          type: string
        motd:
          type: string
    ProblemDetails:
      type: object
      additionalProperties: false
      required:
        - title
        - status
        - code
        - params
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 100
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        code:
          type: string
          description: Stable machine-readable problem code for client handling and localization.
        params:
          $ref: "#/components/schemas/ProblemParams"
          description: Structured interpolation values associated with the problem code.
    ProblemParams:
      type: object
      additionalProperties: true
  securitySchemes:
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
