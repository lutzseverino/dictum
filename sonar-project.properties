sonar.projectKey=dictum
sonar.projectName=Dictum
sonar.sourceEncoding=UTF-8

sonar.sources=apps,packages,services/api/src/main
sonar.tests=services/api/src/test
sonar.test.inclusions=services/api/src/test/**/*.java

# Exclude generated artifacts and docs from analysis noise.
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/coverage/**,**/.scannerwork/**,packages/api-client/src/generated/**,docs/**,services/api/target/**
# Frontend coverage is not collected yet, so keep it analyzable without making the
# quality gate depend on nonexistent reports. Backend coverage comes from JaCoCo.
sonar.coverage.exclusions=apps/**,packages/**,docs/**,packages/api-client/src/generated/**

sonar.java.source=21
sonar.java.binaries=services/api/target/classes
sonar.java.test.binaries=services/api/target/test-classes
sonar.coverage.jacoco.xmlReportPaths=services/api/target/site/jacoco/jacoco.xml
